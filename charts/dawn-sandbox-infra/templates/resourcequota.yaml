{{- if .Values.resourceQuota.enabled }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dawn-sandbox-quota
  namespace: {{ include "dawn-sandbox-infra.namespace" . }}
  labels:
    {{- include "dawn-sandbox-infra.labels" . | nindent 4 }}
spec:
  hard:
    {{- range $key, $value := .Values.resourceQuota.hard }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
{{- end }}
