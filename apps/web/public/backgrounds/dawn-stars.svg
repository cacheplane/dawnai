<svg width="1920" height="800" viewBox="0 0 1920 800" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Sparse star scatter — concentrated in the upper cosmic dark, thinning toward the horizon -->
  <g fill="#f1f5f9">
    <!-- Upper band (densest) -->
    <circle cx="140" cy="80" r="0.7" opacity="0.55"/>
    <circle cx="320" cy="130" r="1.2" opacity="0.75"/>
    <circle cx="460" cy="60" r="0.6" opacity="0.45"/>
    <circle cx="620" cy="100" r="0.9" opacity="0.60"/>
    <circle cx="880" cy="55" r="1.4" opacity="0.85"/>
    <circle cx="1060" cy="120" r="0.7" opacity="0.50"/>
    <circle cx="1240" cy="70" r="1.1" opacity="0.70"/>
    <circle cx="1400" cy="140" r="0.8" opacity="0.55"/>
    <circle cx="1580" cy="90" r="1.0" opacity="0.65"/>
    <circle cx="1760" cy="50" r="0.7" opacity="0.50"/>
    <circle cx="220" cy="200" r="0.6" opacity="0.40"/>
    <circle cx="1680" cy="210" r="0.8" opacity="0.55"/>
    <!-- Mid band (thinning) -->
    <circle cx="80" cy="260" r="0.5" opacity="0.35"/>
    <circle cx="500" cy="290" r="0.9" opacity="0.50"/>
    <circle cx="760" cy="220" r="0.6" opacity="0.40"/>
    <circle cx="1100" cy="310" r="0.5" opacity="0.35"/>
    <circle cx="1340" cy="250" r="1.0" opacity="0.60"/>
    <circle cx="1480" cy="320" r="0.6" opacity="0.40"/>
    <!-- Lower band (sparse, fading as we approach earth atmosphere) -->
    <circle cx="240" cy="400" r="0.5" opacity="0.28"/>
    <circle cx="680" cy="420" r="0.7" opacity="0.35"/>
    <circle cx="1180" cy="430" r="0.5" opacity="0.28"/>
    <circle cx="1560" cy="410" r="0.6" opacity="0.30"/>
  </g>
  <!-- One slightly brighter "signature" star with a subtle twinkle halo -->
  <g filter="url(#star-glow)">
    <circle cx="1520" cy="180" r="1.5" fill="#ffffff" opacity="0.95"/>
  </g>
  <defs>
    <filter id="star-glow" x="1510" y="170" width="20" height="20" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>
</svg>
