# aimock Deployment + Service for the sandbox-k8s-e2e smoke lane.
#
# Runs the locally-built `dawn-smoke-aimock:latest` image (built from
# test/k8s-smoke/aimock/Dockerfile, loaded into kind with `kind load`). Serves
# the committed fixture over an OpenAI-compatible /v1/chat/completions endpoint
# on port 4010. The app reaches it via
# OPENAI_BASE_URL=http://aimock.dawn-app.svc.cluster.local:4010/v1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimock
  namespace: dawn-app
  labels:
    app.kubernetes.io/name: aimock
    app.kubernetes.io/part-of: dawn-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aimock
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aimock
    spec:
      containers:
        - name: aimock
          image: dawn-smoke-aimock:latest
          # Never: the image only exists in kind's local containerd (kind load).
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 4010
          # Readiness only (gates the rollout) — no livenessProbe: a killed
          # liveness check restarts a perfectly healthy mock into CrashLoop.
          # Generous grace so a slow first bind on a loaded kind node never trips it.
          readinessProbe:
            tcpSocket:
              port: 4010
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aimock
  namespace: dawn-app
  labels:
    app.kubernetes.io/name: aimock
    app.kubernetes.io/part-of: dawn-smoke
spec:
  selector:
    app.kubernetes.io/name: aimock
  ports:
    - name: http
      port: 4010
      targetPort: 4010
