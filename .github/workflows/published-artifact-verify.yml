name: Published Artifact Verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: npm version or dist-tag to verify
        required: true
        default: latest
      packageSet:
        description: Package set to verify
        required: true
        default: memory-pgvector-core
        type: choice
        options:
          - memory-pgvector-core
          - public
      runPgvector:
        description: Run Docker pgvector smoke
        required: true
        default: true
        type: boolean
      runOpenAI:
        description: Run real OpenAI embedding smoke
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Registry and tarball verification
        run: pnpm published:verify -- --version "${{ inputs.version }}" --package-set "${{ inputs.packageSet }}"

      - name: Published install/runtime smoke
        if: ${{ !inputs.runOpenAI }}
        shell: bash
        run: |
          args=(--version "${{ inputs.version }}" --package-set "${{ inputs.packageSet }}")
          if [ "${{ inputs.runPgvector }}" = "true" ]; then args+=(--pgvector); fi
          pnpm published:smoke -- "${args[@]}"

      - name: Published install/runtime smoke with OpenAI
        if: ${{ inputs.runOpenAI }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          if [ "${{ inputs.runPgvector }}" != "true" ]; then
            echo "runOpenAI=true requires runPgvector=true" >&2
            exit 1
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is required when runOpenAI=true" >&2
            exit 1
          fi

          args=(--version "${{ inputs.version }}" --package-set "${{ inputs.packageSet }}" --pgvector --openai)
          pnpm published:smoke -- "${args[@]}"
