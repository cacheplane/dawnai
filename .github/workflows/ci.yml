name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changesets:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require changeset for user-facing changes
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: node scripts/check-changesets.mjs

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # 22.14.0 — node:sqlite (used by @dawn-ai/sqlite-storage) is only
          # available without the --experimental-sqlite flag from 22.13+.
          # Matches release.yml and the engines floor.
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build Cache Config
        run: pnpm check:build-cache

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Source Tests
        run: pnpm test

      - name: Docs Check
        run: node scripts/check-docs.mjs

      - name: Pack Check
        run: pnpm pack:check

      - name: Harness Coordinator Self-Test
        run: pnpm verify:harness:self-test

      - name: Framework Verification
        run: pnpm verify:harness:framework

      - name: Runtime Contract Verification
        run: pnpm verify:harness:runtime

      - name: Smoke Harness Verification
        run: pnpm verify:harness:smoke

      - name: Upload Harness Artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: harness-artifacts
          path: artifacts/testing/
          retention-days: 7

  sandbox-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # 22.14.0 — node:sqlite (used by @dawn-ai/sqlite-storage) is only
          # available without the --experimental-sqlite flag from 22.13+.
          # Matches release.yml and the engines floor.
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build sandbox package
        run: pnpm --filter @dawn-ai/workspace build && pnpm --filter @dawn-ai/sandbox build

      - name: Pull sandbox image
        run: docker pull node:22-slim

      - name: Real-Docker sandbox conformance + e2e
        run: DAWN_TEST_DOCKER=1 pnpm --filter @dawn-ai/sandbox test docker-sandbox.integration

  pgvector-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # 22.14.0 — node:sqlite (used by @dawn-ai/sqlite-storage) is only
          # available without the --experimental-sqlite flag from 22.13+.
          # Matches release.yml and the engines floor.
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Full topological build — @dawn-ai/memory-pgvector (and @dawn-ai/testing)
        # compile from source against @dawn-ai/cli/@dawn-ai/workspace etc., so a
        # narrow per-package filter fails to build those deps first (TS2307).
        run: pnpm build

      - name: Real-Postgres pgvector tests
        run: DAWN_TEST_PGVECTOR=1 pnpm --filter @dawn-ai/memory-pgvector test

  chart-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint (strict) — dawn-sandbox-infra
        run: helm lint --strict charts/dawn-sandbox-infra

      - name: Reaper unit test
        run: sh charts/dawn-sandbox-infra/test/reaper.test.sh

      - name: Render assertions — dawn-sandbox-infra
        run: sh charts/dawn-sandbox-infra/test/render.sh

      - name: kubeconform (default values) — dawn-sandbox-infra
        run: |
          helm template test charts/dawn-sandbox-infra \
            | kubeconform -strict -summary -ignore-missing-schemas

      - name: kubeconform (restricted PSS, reaper disabled) — dawn-sandbox-infra
        run: |
          helm template test charts/dawn-sandbox-infra \
            --set podSecurityStandard.enforce=restricted \
            --set reaper.enabled=false \
            | kubeconform -strict -summary -ignore-missing-schemas

      - name: Helm lint (strict) — dawn-app
        run: helm lint --strict charts/dawn-app

      - name: Render assertions — dawn-app
        run: sh charts/dawn-app/test/render.sh

      - name: kubeconform (default values) — dawn-app
        run: |
          helm template test charts/dawn-app --set image.repository=example/app \
            | kubeconform -strict -summary -ignore-missing-schemas

      - name: kubeconform (full override) — dawn-app
        run: |
          helm template test charts/dawn-app \
            --set image.repository=example/app \
            --set ingress.enabled=true \
            --set autoscaling.enabled=true \
            --set podDisruptionBudget.enabled=true \
            | kubeconform -strict -summary -ignore-missing-schemas

  sandbox-k8s:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # 22.14.0 — node:sqlite (used by @dawn-ai/sqlite-storage) is only
          # available without the --experimental-sqlite flag from 22.13+.
          # Matches release.yml and the engines floor.
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build sandbox package
        run: pnpm --filter @dawn-ai/workspace build && pnpm --filter @dawn-ai/sandbox build

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Create kind cluster (no default CNI)
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          config: .github/kind/kind-calico.yaml

      - name: Install Calico (enforces NetworkPolicy)
        run: |
          kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/calico.yaml
          kubectl -n kube-system rollout status daemonset/calico-node --timeout=180s
          kubectl wait --for=condition=Ready nodes --all --timeout=180s

      - name: Install sandbox-infra chart
        run: |
          helm install dawn-sandbox-infra charts/dawn-sandbox-infra --wait
          kubectl -n dawn-sandboxes get role,rolebinding,networkpolicy,resourcequota,limitrange,cronjob,serviceaccount

      - name: Assert orchestrator RBAC (least privilege)
        run: |
          SA=system:serviceaccount:dawn-sandboxes:dawn-orchestrator
          kubectl auth can-i create pods --as=$SA -n dawn-sandboxes | grep -qx yes
          kubectl auth can-i create pods/exec --as=$SA -n dawn-sandboxes | grep -qx yes
          kubectl auth can-i create persistentvolumeclaims --as=$SA -n dawn-sandboxes | grep -qx yes
          kubectl auth can-i create networkpolicies.networking.k8s.io --as=$SA -n dawn-sandboxes | grep -qx yes
          kubectl auth can-i create secrets --as=$SA -n dawn-sandboxes | grep -qx no

      - name: Real-cluster sandbox conformance + e2e
        run: DAWN_TEST_K8S=1 pnpm --filter @dawn-ai/sandbox test kube-sandbox.integration

  chart-apply-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0

      - name: Install dawn-app (placeholder image) and verify it serves
        run: |
          helm install dawn-app charts/dawn-app \
            --set image.repository=traefik/whoami --set image.tag=latest \
            --set containerPort=80 --set healthPath=/ \
            --set serviceAccount.create=true --set serviceAccount.name=dawn-app-smoke \
            --wait --timeout 3m
          kubectl rollout status deploy/dawn-app --timeout=120s
          kubectl run curl --image=curlimages/curl:8.10.1 --restart=Never --rm -i --quiet -- \
            curl -sf http://dawn-app.default.svc.cluster.local/ >/dev/null && echo "app served OK"
