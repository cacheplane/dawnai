name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changesets:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require changeset for user-facing changes
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: node scripts/check-changesets.mjs

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Source Tests
        run: pnpm test

      - name: Docs Check
        run: node scripts/check-docs.mjs

      - name: Pack Check
        run: pnpm pack:check

      - name: Harness Coordinator Self-Test
        run: pnpm verify:harness:self-test

      - name: Framework Verification
        run: pnpm verify:harness:framework

      - name: Runtime Contract Verification
        run: pnpm verify:harness:runtime

      - name: Smoke Harness Verification
        run: pnpm verify:harness:smoke

      - name: Upload Harness Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-artifacts
          path: artifacts/testing/
          retention-days: 7
