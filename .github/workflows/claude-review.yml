name: Claude Review

# Genuine, advisory AI code review on every PR. Posts findings as PR
# comments. NOT a required status check — it never blocks a merge.
# Uses `pull_request` (not pull_request_target) so ANTHROPIC_API_KEY is
# never exposed to fork PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          # Pass GITHUB_TOKEN explicitly (maps to OVERRIDE_GITHUB_TOKEN) so the
          # action skips OIDC token exchange — that path needs `id-token: write`
          # plus the Claude GitHub App, which this repo doesn't use. Posts as
          # github-actions[bot] via the job's pull-requests: write scope.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request and post your findings as GitHub PR comments.
            Read the diff with `gh pr diff` and the description with `gh pr view`.
            Focus on:
            - Correctness bugs
            - Security issues (injection, secrets, unsafe input handling)
            - TypeScript type-safety problems
            - Missing or weak test coverage for the change

            Post a concise top-level summary via `gh pr comment`. Post specific
            issues as inline comments. Be brief; skip nitpicks and style unless
            they affect correctness. If the PR looks good, say so briefly.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      - name: Resolve advisory review threads
        # This review is advisory and must NEVER block a merge (see header).
        # Its inline comments create review threads that would otherwise trip
        # the "Require conversation resolution before merging" branch-protection
        # rule and deadlock auto-merge. Resolve the bot's own unresolved threads
        # so the findings stay visible (collapsed, re-openable) but don't gate
        # the merge. Runs even if the review step errored, so a half-posted
        # review can't leave a PR stuck. Only touches github-actions threads —
        # human review threads are left alone.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          ids=$(gh api graphql -F owner="$OWNER" -F repo="$REPO" -F pr="$PR" -f query='
            query($owner:String!, $repo:String!, $pr:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$pr) {
                  reviewThreads(first:100) {
                    nodes { id isResolved comments(first:1) { nodes { author { login } } } }
                  }
                }
              }
            }' --jq '.data.repository.pullRequest.reviewThreads.nodes[]
                     | select(.isResolved == false and .comments.nodes[0].author.login == "github-actions")
                     | .id')
          for id in $ids; do
            echo "Resolving advisory review thread $id"
            gh api graphql -f id="$id" -f query='
              mutation($id:ID!) {
                resolveReviewThread(input:{threadId:$id}) { thread { isResolved } }
              }'
          done
